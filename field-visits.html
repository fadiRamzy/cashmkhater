<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الزيارات الميدانية</title>
</head>

<body>

<div id="login">
  <h3>تسجيل الدخول</h3>
  <input id="code" placeholder="الكود">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <button onclick="doLogin()">دخول</button>
</div>

<div id="app" style="display:none">
  <h3>تسجيل زيارة</h3>

  <input id="client" placeholder="اسم العميل"><br>
  <input id="officer" placeholder="اسم المسئول"><br>
  <input id="branch" placeholder="الفرع"><br>
  <input id="date" readonly><br>

  <button onclick="getGPS()">تحديد الموقع</button>
  <button onclick="submitVisit()">إرسال</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQRFyfayXYCDFSaJ23HUQsXrOW8cVuTJ4",
  authDomain: "PUT",
  databaseURL: "PUT",
  projectId: "PUT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lat="",lng="";

function doLogin(){
  if(code.value==="100100" && pass.value==="Fadicash@2026"){
    login.style.display="none";
    app.style.display="block";
    date.value=new Date().toLocaleDateString();
  }else{
    alert("خطأ");
  }
}

function getGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    lat=pos.coords.latitude;
    lng=pos.coords.longitude;
    alert("تم تحديد الموقع");
  });
}

function submitVisit(){
  db.ref("field_visits").push({
    clientName:client.value,
    officerName:officer.value,
    branch:branch.value,
    visitDate:date.value,
    latitude:lat,
    longitude:lng,
    mapLink:`https://maps.google.com/?q=${lat},${lng}`
  });
  alert("تم الحفظ");
}
</script>

</body>
</html>
