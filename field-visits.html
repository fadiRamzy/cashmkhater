<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Field Visits</title>
<style>
body{font-family:Arial;text-align:center}
input{padding:10px;margin:5px;width:250px}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<div id="login">
  <h3>تسجيل الدخول</h3>
  <input id="code" placeholder="الكود">
  <input id="pass" type="password" placeholder="كلمة المرور">
  <br>
  <button onclick="doLogin()">دخول</button>
</div>

<div id="app" style="display:none">
  <h3>تسجيل زيارة ميدانية</h3>

  <input id="client" placeholder="اسم العميل"><br>
  <input id="officer" placeholder="اسم المسئول"><br>
  <input id="branch" placeholder="الفرع"><br>
  <input id="date" readonly><br>

  <button onclick="getGPS()">📍 تحديد الموقع</button><br>
  <button onclick="submitVisit()">إرسال</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQRFyfayXYCDFSaJ23HUQsXrOW8cVuTJ4",
  authDomain: "PUT",
  databaseURL: "PUT",
  projectId: "PUT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lat="",lng="";

function doLogin(){
  const c = document.getElementById("code").value;
  const p = document.getElementById("pass").value;

  if(c==="100100" && p==="Fadicash@2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("date").value = new Date().toLocaleDateString();
  }else{
    alert("بيانات غلط");
  }
}

function getGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    alert("تم تحديد الموقع");
  });
}

function submitVisit(){
  const data={
    clientName:document.getElementById("client").value,
    officerName:document.getElementById("officer").value,
    branch:document.getElementById("branch").value,
    visitDate:document.getElementById("date").value,
    latitude:lat,
    longitude:lng,
    mapLink:`https://maps.google.com/?q=${lat},${lng}`,
    timestamp:Date.now()
  };

  db.ref("field_visits").push(data);
  alert("تم الحفظ");
}
</script>

</body>
</html>
