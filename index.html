<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Risk System</title>
<style>
body{font-family:Arial;text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ccc;padding:8px}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<h2>النظام الأساسي</h2>

<a href="field-visits.html" target="_blank">
  <button>📍 الزيارات الميدانية</button>
</a>

<br><br>

<button onclick="loadFvAdmin()">تحميل الزيارات</button>

<table>
<thead>
<tr>
<th>#</th>
<th>العميل</th>
<th>المسئول</th>
<th>الفرع</th>
<th>التاريخ</th>
<th>الموقع</th>
</tr>
</thead>
<tbody id="fvAdminBody"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PUT YOUR KEY",
  authDomain: "PUT",
  databaseURL: "PUT",
  projectId: "PUT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function loadFvAdmin(){
  db.ref("field_visits").once("value", snap=>{
    const data = snap.val() || {};
    const tbody = document.getElementById("fvAdminBody");
    tbody.innerHTML = "";

    let i=1;
    Object.values(data).forEach(r=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${i++}</td>
        <td>${r.clientName||""}</td>
        <td>${r.officerName||""}</td>
        <td>${r.branch||""}</td>
        <td>${r.visitDate||""}</td>
        <td><a href="${r.mapLink}" target="_blank">📍 عرض</a></td>
      `;
      tbody.appendChild(tr);
    });
  });
}
</script>

</body>
</html>
